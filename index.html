<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <title>Portfolio, Bootstrap and JavaScript</title>
</head>

<body>
    <div class="Container">
        
        <div class="grid">
            
            <form id="contactForm">
                <div class="header">
                    <h1>Registration Form</h1>
                </div>
                <input class="m-2 p-3  " type="text" id="name" placeholder="Full Name" required> <br>
                <input class="m-2 p-3  " type="email" id="email" placeholder="Email Address" required><br>
                <input class="m-2 p-3  " type="text" id="password" placeholder="Password" required><br>
                <p id="error" style="color:red;"></p> <br>
                <button type="submit">Submit</button>
                <div id="message"></div>
            </form>
            
            <!-- Container for messages -->
            
        </div>
    </div>


    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
