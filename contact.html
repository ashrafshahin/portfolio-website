<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <title>Portfolio, Bootstrap and JavaScript</title>
</head>

<body>
    <div class="Container">
        <div>
            <form action="" id="contactForm">
                <header>Contact Form</header>
                <input class="m-2 p-3" id="email" type="email" placeholder="email" name="email">
                <p class="inputError" id="emailError"></p>
                <input class="m-2 p-3" id="password" type="password" placeholder="password" name="password">
                <p class="inputError" id="passwordError"></p>
                <button type="submit">Submit</button>
                <p class="success" id="submitMsg">Login successful...</p>
            </form>
        </div>


    </div>


    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/script2.js"> </script>
    
</body>

</html>
